<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拆信特效原型</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
      font-family: 'Georgia', 'Noto Serif SC', serif;
    }

    /* ========== 信封容器 ========== */
    .envelope-wrap {
      position: relative;
      width: min(300px, 75vw);
      aspect-ratio: 1.5 / 1;
      cursor: pointer;
      perspective: 800px;
    }

    /* ========== 信封主体 ========== */
    .envelope-body {
      position: absolute; inset: 0;
      background: linear-gradient(145deg, #3a2040, #251530, #1e1228);
      border: 1.5px solid #f5c6d044;
      border-radius: 8px;
      box-shadow:
        0 8px 40px #00000080,
        inset 0 1px 0 #f5c6d018;
    }
    .envelope-body::before {
      content: '';
      position: absolute; inset: 10px;
      border: 1px solid #f5c6d015;
      border-radius: 4px;
      pointer-events: none;
    }

    /* ========== 信封翻盖 ========== */
    .envelope-flap {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 55%;
      transform-origin: top center;
      transform: rotateX(0deg);
      transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 3;
    }
    .envelope-flap.open {
      transform: rotateX(180deg) translateY(-30%);
      opacity: 0;
      transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease 0.6s;
    }
    .flap-face {
      position: absolute;
      width: 100%; height: 100%;
      background: linear-gradient(160deg, #3a2040, #2a1a35, #201530);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
    }
    .flap-back {
      position: absolute;
      width: 100%; height: 100%;
      background: linear-gradient(160deg, #2a1830, #1e1225);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform: rotateX(180deg);
      backface-visibility: hidden;
    }

    /* ========== 信封内卡 ========== */
    .envelope-card {
      position: absolute;
      left: 10%; right: 10%;
      bottom: 15%; height: 70%;
      background: linear-gradient(145deg, #2a1a35, #1e1228);
      border: 1px solid #f5c6d022;
      border-radius: 6px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 5;
      opacity: 0; transform: translateY(0);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.4s;
    }
    .envelope-card.rise {
      opacity: 1;
      transform: translateY(-120%);
    }
    .envelope-card .card-text {
      font-size: clamp(1.1rem, 4.5vw, 1.6rem);
      color: #f5c6d0;
      letter-spacing: 0.3em;
      font-weight: 300;
      opacity: 0;
      transition: opacity 0.6s ease 0.8s;
    }
    .envelope-card .card-hint {
      font-size: clamp(0.6rem, 2.5vw, 0.75rem);
      color: #a0809066;
      margin-top: 1rem;
      letter-spacing: 0.1em;
      opacity: 0;
      transition: opacity 0.6s ease 1.2s;
    }
    .envelope-card.show-text .card-text { opacity: 1; }
    .envelope-card.show-text .card-hint { opacity: 1; }

    /* ========== 翻盖引导光点 + 结构线 ========== */
    .flap-guide {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 55%;
      pointer-events: none;
      z-index: 4;
      transition: opacity 0.4s ease;
    }

    /* 光点 */
    .guide-dot {
      position: absolute;
      top: 48%; left: 50%;
      width: 8px; height: 8px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #f5c6d0;
      box-shadow:
        0 0 6px 2px #f5c6d088,
        0 0 16px 4px #f5c6d044,
        0 0 30px 8px #f5c6d022;
      animation: dotPulse 2s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.8); box-shadow: 0 0 6px 2px #f5c6d088, 0 0 16px 4px #f5c6d044; }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 10px 4px #f5c6d0aa, 0 0 24px 8px #f5c6d066, 0 0 40px 12px #f5c6d033; }
    }

    /* 左上角结构线 */
    .guide-line {
      position: absolute;
      top: 48%; left: 50%;
      height: 1px;
      background: linear-gradient(to right, #f5c6d066, #f5c6d022, transparent);
      transform-origin: 0 0;
      animation: lineFade 2s ease-in-out infinite;
    }
    .guide-line.left {
      width: 45%;
      transform: rotate(-42deg);
      background: linear-gradient(to right, #f5c6d066, #f5c6d022, transparent);
    }
    .guide-line.right {
      width: 45%;
      transform: rotate(42deg);
      background: linear-gradient(to left, #f5c6d066, #f5c6d022, transparent);
      transform-origin: 0 0;
      left: 50%;
    }
    @keyframes lineFade {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* ========== 点击提示（底部） ========== */
    .click-hint {
      position: absolute;
      bottom: -36px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: #a0809055;
      letter-spacing: 0.15em;
      animation: hintPulse 2s ease infinite;
      white-space: nowrap;
    }
    @keyframes hintPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    /* ========== 背景粒子 ========== */
    .bg-particle {
      position: fixed; pointer-events: none;
      width: 2px; height: 2px;
      border-radius: 50%;
      background: #f5c6d022;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ========== 星光爆发粒子 ========== */
    .sparkle-burst {
      position: fixed;
      pointer-events: none;
      z-index: 100;
    }
    .sparkle {
      position: absolute;
      border-radius: 50%;
      animation: sparkleFly linear forwards;
    }
    @keyframes sparkleFly {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      60% { opacity: 1; }
      100% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; }
    }

    /* 十字星光 */
    .sparkle-cross {
      position: absolute;
      animation: sparkleFly linear forwards;
    }
    .sparkle-cross::before,
    .sparkle-cross::after {
      content: '';
      position: absolute;
      background: #f5c6d0;
      border-radius: 1px;
    }
    .sparkle-cross::before {
      width: 2px; height: 10px;
      left: -1px; top: -5px;
    }
    .sparkle-cross::after {
      width: 10px; height: 2px;
      left: -5px; top: -1px;
    }

    /* ========== 过渡淡出 ========== */
    .envelope-wrap.fade-out {
      opacity: 0;
      transform: scale(0.95);
      transition: all 0.8s ease 0.3s;
    }

    /* ========== 密码页预览 ========== */
    .gate-preview {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a0a;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none; z-index: 10;
    }
    .gate-preview.visible {
      opacity: 1; pointer-events: auto;
    }
    .gate-preview h1 {
      font-size: 2.5rem; font-weight: 300;
      color: #f5c6d0; letter-spacing: 0.5em;
    }
    .gate-preview p {
      margin-top: 1rem; font-size: 0.8rem;
      color: #a0809066; letter-spacing: 0.1em;
    }

    .debug-info {
      position: fixed; top: 10px; left: 10px;
      font-size: 0.6rem; color: #a0809033;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <div id="particles"></div>

  <div class="envelope-wrap" id="envelope" onclick="openEnvelope()">
    <div class="envelope-body"></div>
    <div class="envelope-card" id="card">
      <div class="card-text">这封信，只给你</div>
      <div class="card-hint">点击继续</div>
    </div>
    <div class="envelope-flap" id="flap">
      <div class="flap-face"></div>
      <div class="flap-back"></div>
    </div>
    <div class="flap-guide" id="flapGuide">
      <div class="guide-line left"></div>
      <div class="guide-line right"></div>
      <div class="guide-dot"></div>
    </div>
    <div class="click-hint">✉️ 点击打开</div>
  </div>

  <div class="gate-preview" id="gatePreview">
    <h1>萱</h1>
    <p>（密码页预览）</p>
  </div>

  <div class="debug-info" id="debugInfo"></div>

  <script>
    // 背景粒子
    (function createParticles() {
      const c = document.getElementById('particles');
      for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'bg-particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (10 + Math.random() * 15) + 's';
        p.style.animationDelay = Math.random() * 10 + 's';
        const s = 1.5 + Math.random() * 2;
        p.style.width = p.style.height = s + 'px';
        c.appendChild(p);
      }
    })();

    // ========== 星光爆发 ==========
    function createSparkleBurst(x, y) {
      const container = document.createElement('div');
      container.className = 'sparkle-burst';
      container.style.left = x + 'px';
      container.style.top = y + 'px';
      document.body.appendChild(container);

      const colors = ['#f5c6d0', '#ff6b9d', '#fff', '#ffd700', '#ffb6c1'];

      // 圆点星光
      for (let i = 0; i < 30; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        const angle = (Math.PI * 2 * i) / 30 + (Math.random() - 0.5) * 0.5;
        const dist = 60 + Math.random() * 120;
        const sx = Math.cos(angle) * dist;
        const sy = Math.sin(angle) * dist;
        const size = 2 + Math.random() * 4;
        s.style.cssText = `
          --sx: ${sx}px; --sy: ${sy}px;
          width: ${size}px; height: ${size}px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          animation-duration: ${0.6 + Math.random() * 0.6}s;
          animation-delay: ${Math.random() * 0.15}s;
          box-shadow: 0 0 ${size * 2}px ${colors[Math.floor(Math.random() * colors.length)]}88;
        `;
        container.appendChild(s);
      }

      // 十字星光
      for (let i = 0; i < 12; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle-cross';
        const angle = (Math.PI * 2 * i) / 12;
        const dist = 80 + Math.random() * 100;
        const sx = Math.cos(angle) * dist;
        const sy = Math.sin(angle) * dist;
        s.style.cssText = `
          --sx: ${sx}px; --sy: ${sy}px;
          animation-duration: ${0.8 + Math.random() * 0.5}s;
          animation-delay: ${Math.random() * 0.2}s;
        `;
        container.appendChild(s);
      }

      setTimeout(() => container.remove(), 2000);
    }

    // ========== 开信逻辑 ==========
    let opened = false;

    function openEnvelope() {
      if (opened) return;
      opened = true;

      const flap = document.getElementById('flap');
      const card = document.getElementById('card');
      const wrap = document.getElementById('envelope');
      const gate = document.getElementById('gatePreview');

      // 获取信封中心位置
      const rect = wrap.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      // Step 1: 隐藏引导 + 翻盖打开 + 星光爆发
      document.getElementById('flapGuide').style.opacity = '0';
      flap.classList.add('open');
      setTimeout(() => createSparkleBurst(cx, cy - 30), 300);

      // Step 2: 卡片升起
      setTimeout(() => card.classList.add('rise'), 600);

      // Step 3: 显示文字 + 第二波小星光
      setTimeout(() => {
        card.classList.add('show-text');
        createSparkleBurst(cx, cy - 60);
      }, 1000);

      // Step 4: 点击卡片 → 进入密码页
      card.addEventListener('click', (e) => {
        e.stopPropagation();
        // 离开时再来一波星光
        createSparkleBurst(cx, cy);
        wrap.classList.add('fade-out');
        setTimeout(() => {
          wrap.style.display = 'none';
          gate.classList.add('visible');
        }, 800);
      });

      setTimeout(() => { card.style.cursor = 'pointer'; }, 1500);
    }

    document.getElementById('debugInfo').textContent =
      `${window.innerWidth}x${window.innerHeight} | ${navigator.userAgent.includes('Mobile') ? 'Mobile' : 'Desktop'}`;
  </script>

</body>
</html>
