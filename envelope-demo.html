<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拆信特效原型</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
      font-family: 'Georgia', 'Noto Serif SC', serif;
    }

    /* ========== 信封容器 ========== */
    .envelope-wrap {
      position: relative;
      width: min(320px, 80vw);
      aspect-ratio: 1.5 / 1;
      cursor: pointer;
      perspective: 800px;
    }

    /* ========== 信封主体 ========== */
    .envelope-body {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #2a1a2e, #1a1028);
      border: 1px solid #f5c6d033;
      border-radius: 8px;
      box-shadow: 0 8px 40px #00000080, inset 0 0 30px #f5c6d008;
      overflow: hidden;
    }

    /* 信封纹理 */
    .envelope-body::before {
      content: '';
      position: absolute; inset: 10px;
      border: 1px solid #f5c6d015;
      border-radius: 4px;
      pointer-events: none;
    }

    /* ========== 信封翻盖 ========== */
    .envelope-flap {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 55%;
      transform-origin: top center;
      transform: rotateX(0deg);
      transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 3;
    }
    .envelope-flap.open {
      transform: rotateX(180deg);
    }

    /* 翻盖面（三角形） */
    .flap-face {
      position: absolute;
      width: 100%; height: 100%;
      background: linear-gradient(160deg, #2a1a2e, #1e1225);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      border-bottom: 1px solid #f5c6d022;
    }

    /* 翻盖背面 */
    .flap-back {
      position: absolute;
      width: 100%; height: 100%;
      background: linear-gradient(160deg, #231520, #1a1020);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform: rotateX(180deg);
      backface-visibility: hidden;
    }

    /* ========== 信封内卡 ========== */
    .envelope-card {
      position: absolute;
      left: 10%; right: 10%;
      bottom: 15%;
      height: 70%;
      background: linear-gradient(135deg, #1e1228, #16101e);
      border: 1px solid #f5c6d022;
      border-radius: 6px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1;
      opacity: 0;
      transform: translateY(0);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.4s;
    }
    .envelope-card.rise {
      opacity: 1;
      transform: translateY(-120%);
    }

    .envelope-card .card-text {
      font-size: clamp(1.2rem, 5vw, 1.8rem);
      color: #f5c6d0;
      letter-spacing: 0.3em;
      font-weight: 300;
      opacity: 0;
      transition: opacity 0.6s ease 0.8s;
    }
    .envelope-card .card-hint {
      font-size: clamp(0.65rem, 2.5vw, 0.8rem);
      color: #a0809088;
      margin-top: 1rem;
      letter-spacing: 0.1em;
      opacity: 0;
      transition: opacity 0.6s ease 1.2s;
    }
    .envelope-card.show-text .card-text { opacity: 1; }
    .envelope-card.show-text .card-hint { opacity: 1; }

    /* ========== 信封底部装饰线 ========== */
    .envelope-seal {
      position: absolute;
      bottom: 8%; left: 50%;
      transform: translateX(-50%);
      width: 36px; height: 36px;
      border-radius: 50%;
      background: radial-gradient(circle, #ff6b9d44, #ff6b9d11);
      border: 1px solid #ff6b9d33;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      z-index: 2;
      transition: opacity 0.4s ease;
    }
    .envelope-seal.hidden { opacity: 0; }

    /* ========== 点击提示 ========== */
    .click-hint {
      position: absolute;
      bottom: -40px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: #a0809066;
      letter-spacing: 0.15em;
      animation: hintPulse 2s ease infinite;
      white-space: nowrap;
    }
    @keyframes hintPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    /* ========== 背景粒子 ========== */
    .bg-particle {
      position: fixed; pointer-events: none;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: #f5c6d033;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ========== 过渡：信封整体淡出 ========== */
    .envelope-wrap.fade-out {
      opacity: 0;
      transform: scale(0.95);
      transition: all 0.8s ease 0.3s;
    }

    /* ========== 下一步预览（密码页） ========== */
    .gate-preview {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a0a;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
      z-index: 10;
    }
    .gate-preview.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .gate-preview h1 {
      font-size: 2.5rem; font-weight: 300;
      color: #f5c6d0; letter-spacing: 0.5em;
    }
    .gate-preview p {
      margin-top: 1rem; font-size: 0.85rem;
      color: #a0809088; letter-spacing: 0.1em;
    }

    /* ========== 调试信息 ========== */
    .debug-info {
      position: fixed; top: 10px; left: 10px;
      font-size: 0.65rem; color: #a0809044;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <!-- 背景粒子 -->
  <div id="particles"></div>

  <!-- 信封 -->
  <div class="envelope-wrap" id="envelope" onclick="openEnvelope()">
    <div class="envelope-body"></div>
    <div class="envelope-card" id="card">
      <div class="card-text">这封信，只给你</div>
      <div class="card-hint">点击继续</div>
    </div>
    <div class="envelope-flap" id="flap">
      <div class="flap-face"></div>
      <div class="flap-back"></div>
    </div>
    <div class="envelope-seal" id="seal">💕</div>
    <div class="click-hint">✉️ 点击打开</div>
  </div>

  <!-- 密码页预览 -->
  <div class="gate-preview" id="gatePreview">
    <h1>萱</h1>
    <p>（密码页预览）</p>
  </div>

  <!-- 调试 -->
  <div class="debug-info" id="debugInfo"></div>

  <script>
    // 背景粒子
    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'bg-particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (8 + Math.random() * 12) + 's';
        p.style.animationDelay = Math.random() * 10 + 's';
        p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
        container.appendChild(p);
      }
    }
    createParticles();

    let opened = false;

    function openEnvelope() {
      if (opened) return;
      opened = true;

      const flap = document.getElementById('flap');
      const card = document.getElementById('card');
      const seal = document.getElementById('seal');
      const wrap = document.getElementById('envelope');
      const gate = document.getElementById('gatePreview');

      // Step 1: 翻盖打开
      flap.classList.add('open');
      seal.classList.add('hidden');

      // Step 2: 卡片升起
      setTimeout(() => {
        card.classList.add('rise');
      }, 600);

      // Step 3: 显示文字
      setTimeout(() => {
        card.classList.add('show-text');
      }, 1000);

      // Step 4: 点击卡片 → 进入密码页
      card.addEventListener('click', (e) => {
        e.stopPropagation();
        wrap.classList.add('fade-out');
        setTimeout(() => {
          wrap.style.display = 'none';
          gate.classList.add('visible');
        }, 800);
      });

      // 也可以直接点整个区域跳过
      setTimeout(() => {
        card.style.cursor = 'pointer';
      }, 1500);
    }

    // 显示设备信息
    const info = document.getElementById('debugInfo');
    info.textContent = `${window.innerWidth}x${window.innerHeight} | ${navigator.userAgent.includes('Mobile') ? 'Mobile' : 'Desktop'}`;
  </script>

</body>
</html>
